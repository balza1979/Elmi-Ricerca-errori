<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>ELMI – Errori</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Libreria per leggere Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min
<style>
  body {
    margin: 0;
    padding: 0;
    background: #d1d5db;
    font-family: Arial, sans-serif;
  }

  header {
    background: #b91c1c;
    color: white;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    text-align: center;
  }

  .container {
    max-width: 800px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  label {
    font-weight: bold;
    display: block;
    margin-top: 20px;
  }

  select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #9ca3af;
    font-size: 16px;
  }

  textarea {
    height: 150px;
    resize: vertical;
    overflow-y: scroll;
  }
</style>
</head>

<body>

<header>ELMI</header>

<div class="container">
  <label id="labelA">Caricamento...</label>
  <select id="menu"></select>

  <label id="labelB"></label>
  <textarea id="campoB" readonly></textarea>

  <label id="labelC"></label>
  <textarea id="campoC" readonly></textarea>

  <label id="labelD"></label>
  <textarea id="campoD" readonly></textarea>
</div>

<script>
async function caricaExcel() {
  // Scarica errori.xlsx dalla stessa cartella
  const file = await fetch("errori.xlsx");
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });

  const sheet = workbook.Sheets["errori"];
  const dati = XLSX.utils.sheet_to_json(sheet, { header: 1 });

  const intestazioni = dati[0];
  const righe = dati.slice(1);

  // Titoli presi dalla riga 1
  document.getElementById("labelA").textContent = intestazioni[0];
  document.getElementById("labelB").textContent = intestazioni[1];
  document.getElementById("labelC").textContent = intestazioni[2];
  document.getElementById("labelD").textContent = intestazioni[3];

  const menu = document.getElementById("menu");

  // Popola tendina dalla colonna A
  righe.forEach((riga, index) => {
    if (riga[0]) {
      const opt = document.createElement("option");
      opt.value = index;
      opt.textContent = riga[0];
      menu.appendChild(opt);
    }
  });

  // Aggiorna i tre campi multiriga quando selezioni una voce
  menu.addEventListener("change", () => {
    const r = righe[menu.value];
    document.getElementById("campoB").value = r[1] || "";
    document.getElementById("campoC").value = r[2] || "";
    document.getElementById("campoD").value = r[3] || "";
  });

  // Forza aggiornamento iniziale
  menu.dispatchEvent(new Event("change"));
}

caricaExcel();
</script>

</body>
</html>
