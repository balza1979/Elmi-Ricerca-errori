<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>La mia prima pagina</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #020617;
      border-radius: 16px;
      padding: 32px 40px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
      max-width: 480px;
      text-align: center;
      border: 1px solid #1f2937;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 28px;
      letter-spacing: 0.03em;
    }
    p {
      margin-top: 0;
      margin-bottom: 20px;
      color: #9ca3af;
    }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #020617;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(34,197,94,0.35);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 40px rgba(34,197,94,0.45);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ciao, Luca 👋</h1>
    <p>Questa è una pagina web semplice, pronta per essere messa su GitHub.</p>
    <a class="btn" href="#">Pulsante di esempio</a>
  </div>
</body>
</html>
