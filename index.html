<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>ELMI – PDF</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    margin: 0;
    padding: 0;
    background: #d1d5db;
    font-family: Arial, sans-serif;
  }

  header {
    background: #b91c1c;
    color: white;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    text-align: center;
  }

  .container {
    max-width: 600px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    font-size: 18px;
    background: #b91c1c;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>

<body>

<header>ELMI – PDF</header>

<div class="container" id="listaPDF">
  <p>Caricamento PDF...</p>
</div>

<script>
async function cercaPDF() {
  const container = document.getElementById("listaPDF");
  container.innerHTML = "";

  for (let i = 1; i <= 30; i++) {
    const nome = `pdf${i}.pdf`;
    const url = `${nome}`;

    try {
      const risposta = await fetch(url, { method: "HEAD" });

      if (risposta.ok) {
        const btn = document.createElement("button");
        btn.textContent = nome;
        btn.onclick = () => window.open(url, "_blank");
        container.appendChild(btn);
      }
    } catch (e) {
      // ignora errori
    }
  }

  if (container.innerHTML.trim() === "") {
    container.innerHTML = "<p>Nessun PDF trovato.</p>";
  }
}

cercaPDF();
</script>

</body>
</html>
